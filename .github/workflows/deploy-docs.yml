name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['docs/**', 'documentation_website/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: documentation_website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: documentation_website

      - name: Build website
        run: npm run build
        working-directory: documentation_website

      - name: Deploy to GitHub Pages
        working-directory: documentation_website
        env:
          GIT_USER: adysingh5711
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run deploy
