name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ensure Code Formats and Lints
      run: |
        pip install flake8
        flake8 cswon neurons --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test
      run: |
        pip install pytest pytest-asyncio
        pytest tests/
